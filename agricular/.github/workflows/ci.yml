name: CI/CD Demo

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
jobs:
  test-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run test
      run: pytest

    - name: Run app (fake deploy)
      run: |
        python manage.py migrate
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10