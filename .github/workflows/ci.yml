name: CI/CD Demo

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
jobs:
  test-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    - name: Install dependencies
      run: |
        cd agricular
        pip install -r requirements.txt

    - name: Run test
      run: |
        cd agricular
        pytest
  deploy:
    needs: test-and-run
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to production
      run: echo "Deploying to production..."